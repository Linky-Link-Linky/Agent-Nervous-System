name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.version=$(echo '${{ github.ref_name }}' | sed 's/refs\/tags\///')" \
            -trimpath \
            -o "ans_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext || '' }}" \
            ./cmd/ans
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7803305oc0eca5 # v4
        with:
          name: ans_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ans_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext || '' }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@cc203385981b70ca67e7cc3b12c6d8d229f048ce # v4
        with:
          merge-multiple: true
          path: dist/
      - name: Generate checksums
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ans_* > checksums.txt
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 ans_* > checksums.txt
          else
            echo "no sha256sum or shasum found" >&2; exit 1
          fi
      - uses: softprops/action-gh-release@da0d79b2aa5b2b86fe3af5743f69d3add8c5a2c0 # v2
        with:
          files: |
            dist/ans_*
            dist/checksums.txt
          generate_release_notes: true
