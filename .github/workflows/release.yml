name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: make build-all
      - name: Upload binaries
        uses: softprops/action-gh-release@v3
        with:
          files: bin/ans_*
          generate_release_notes: true
