name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current contributors
        id: read
        run: |
          CONTRIB=$(cat .github/cla-contributors.json)
          echo "contributors=$CONTRIB" >> $GITHUB_OUTPUT

      - name: Handle CLA signing comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            const trigger = "i have read the cla and i hereby sign it";
            if (comment !== trigger) {
              return;
            }
            const user = context.payload.comment.user.login;
            const fs = require('fs');
            const contribPath = '.github/cla-contributors.json';
            const data = JSON.parse(fs.readFileSync(contribPath, 'utf8'));
            if (!data.contributors.includes(user)) {
              data.contributors.push(user);
              fs.writeFileSync(contribPath, JSON.stringify(data, null, 2) + '\n');
              await exec.exec('git', ['config', 'user.name', 'cla-bot']);
              await exec.exec('git', ['config', 'user.email', 'cla@agent-nervous-system.com']);
              await exec.exec('git', ['add', contribPath]);
              await exec.exec('git', ['commit', '-m', `cla: record signature from ${user}`]);
              await exec.exec('git', ['push']);
            }
            const pr = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `✅ Thank you @${user}! Your CLA signature has been recorded.`
            });

      - name: Check CLA status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const user = context.payload.pull_request.user.login;
            const fs = require('fs');
            const contribPath = '.github/cla-contributors.json';
            const data = JSON.parse(fs.readFileSync(contribPath, 'utf8'));
            const signed = data.contributors.includes(user);
            if (!signed) {
              const claMsg = `Thank you for your contribution @${user}! 🚀

        Before we can merge this PR, please read and sign our Contributor License Agreement.

        1. Read the [CLA](CLA.md) and [Corporate CLA](CLA-CORPORATE.md) (if contributing on behalf of a company).
        2. Comment on this PR with:

        > I have read the CLA and I hereby sign it.

        Once signed, this check will pass automatically.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: claMsg
              });
            }
            core.setOutput('signed', signed ? 'true' : 'false');
            return signed ? 'signed' : 'unsigned';
