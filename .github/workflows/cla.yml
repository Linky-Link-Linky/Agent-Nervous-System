name: CLA Assistant
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - name: CLA Assistant
        uses: actions/github-script@v7
        with:
          script: |
            const ALLOWLIST = ['dependabot[bot]', 'renovate[bot]', 'github-actions[bot]', 'Linky-Link-Linky'];
            const SIG_PATH = 'signatures/version1/cla.json';
            const SIG_BRANCH = 'cla-signatures';
            const CLA_URL = 'https://gist.github.com/Linky-Link-Linky/eb643401c2b939f743504bca5b5e7d7e';
            const CHECK_NAME = 'CLAAssistant';
            const SIGN_TEXT = 'I have read the CLA Document and I hereby sign the CLA';

            async function getSignatures() {
              try {
                const { data } = await github.rest.repos.getContent({
                  ...context.repo, path: SIG_PATH, ref: SIG_BRANCH
                });
                const content = Buffer.from(data.content, 'base64').toString('utf8');
                return { sigData: JSON.parse(content), sha: data.sha };
              } catch (e) {
                if (e.status === 404) return { sigData: { signedContributors: [] }, sha: null };
                throw e;
              }
            }

            async function setCLAStatus(sha, state, desc) {
              await github.rest.repos.createCommitStatus({
                ...context.repo, sha, state, context: CHECK_NAME, description: desc
              });
            }

            async function comment(body) {
              const { data: existing } = await github.rest.issues.listComments({
                ...context.repo, issue_number: context.issue.number
              });
              const dup = existing.some(c => c.user?.type === 'Bot' && c.body === body);
              if (!dup) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: context.issue.number, body
                });
              }
            }

            async function checkCLA(username, sha) {
              const { sigData } = await getSignatures();
              const signed = (sigData.signedContributors || []).map(s => s.username);
              if (ALLOWLIST.includes(username)) return setCLAStatus(sha, 'success', 'Author is in allowlist');
              if (signed.includes(username)) return setCLAStatus(sha, 'success', 'CLA signed');
              await setCLAStatus(sha, 'failure', 'CLA must be signed');
              return false;
            }

            if (context.eventName === 'pull_request_target') {
              const author = context.payload.pull_request.user.login;
              const sha = context.payload.pull_request.head.sha;
              const ok = await checkCLA(author, sha);
              if (!ok) {
                await comment(
                  `Thank you for your contribution! Before this pull request can be merged, you must read and sign the **Individual Contributor License Agreement (CLA)**.\n\n` +
                  `📄 [View the CLA](${CLA_URL})\n\n` +
                  `To accept, post a comment with the following exact text:\n\n` +
                  `\`\`\`\n${SIGN_TEXT}\n\`\`\``
                );
              }
              return;
            }

            if (context.eventName === 'issue_comment') {
              const body = context.payload.comment.body.trim();
              const commentAuthor = context.payload.comment.user.login;
              const { data: pr } = await github.rest.pulls.get({
                ...context.repo, pull_number: context.issue.number
              });
              const sha = pr.head.sha;

              if (body === 'recheck') {
                await checkCLA(pr.user.login, sha);
                return;
              }

              if (body === SIGN_TEXT) {
                const { sigData, sha: sigFileSha } = await getSignatures();
                const signed = (sigData.signedContributors || []).map(s => s.username);
                if (signed.includes(commentAuthor)) {
                  await setCLAStatus(sha, 'success', 'CLA signed');
                  await comment(`✅ You have already signed the CLA. Thank you!`);
                  return;
                }
                sigData.signedContributors = sigData.signedContributors || [];
                sigData.signedContributors.push({
                  username: commentAuthor,
                  date: new Date().toISOString().split('T')[0]
                });
                sigData.signedContributors.sort((a, b) => a.username.localeCompare(b.username));
                const newContent = Buffer.from(JSON.stringify(sigData, null, 3)).toString('base64');
                const opts = { ...context.repo, path: SIG_PATH, message: `cla: sign ${commentAuthor}`, content: newContent, branch: SIG_BRANCH };
                if (sigFileSha) opts.sha = sigFileSha;
                await github.rest.repos.createOrUpdateFileContents(opts);
                await setCLAStatus(sha, 'success', 'CLA signed');
                await comment(`✅ Thank you, @${commentAuthor}! Your CLA signature has been recorded.`);
                return;
              }
            }
