name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://gist.github.com/Linky-Link-Linky/eb643401c2b939f743504bca5b5e7d7e'
          branch: 'master'
          allowlist: dependabot[bot],renovate[bot],github-actions[bot],Linky-Link-Linky
          lock-pullrequest-aftermerge: false
          custom-notsigned-prcomment: 'Thank you for your contribution! Before this pull request can be merged, you must read and sign the **Individual Contributor License Agreement (CLA)**. Please read the full agreement at the link below, then post a comment on this PR with the following exact text to indicate your acceptance:

**I have read the CLA Document and I hereby sign the CLA**

📄 [View the CLA](https://gist.github.com/Linky-Link-Linky/eb643401c2b939f743504bca5b5e7d7e)

> Once signed, the CLA Assistant bot will verify your signature and update the status of this PR.'
          custom-allsigned-prcomment: 'All contributors have signed the Individual Contributor License Agreement. Thank you!'
